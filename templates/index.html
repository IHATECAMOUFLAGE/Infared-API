<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer"> 
    <title>Stealth YouTube Player</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { padding: 10px; width: 60%; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #ff0000; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #cc0000; }
        video { width: 100%; margin-top: 20px; background: black; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Stealth Player</h1>
        <p>Paste a YouTube link below:</p>
        <input type="text" id="videoUrl" placeholder="https://www.youtube.com/watch?v=...">
        <button onclick="loadVideo()">Play</button>

        <video id="player" controls style="display:none;"></video>
    </div>

    <script>
        async function loadVideo() {
            const url = document.getElementById('videoUrl').value;
            const player = document.getElementById('player');

            if (!url) return;

            player.style.display = 'block';
            player.textContent = "Loading...";

            try {
                // USE RELATIVE PATHS HERE (remove localhost part)
                // 1. Get info
                const res = await fetch(`/get-video-info?url=${encodeURIComponent(url)}`);
                const data = await res.json();

                if (data.error) {
                    alert("Error: " + data.error);
                    player.style.display = 'none';
                    return;
                }

                // 2. Set player to proxy
                player.src = `/proxy-video?url=${encodeURIComponent(data.stream_url)}`;
                player.load();
                player.play();

            } catch (err) {
                console.error(err);
                alert("Connection failed.");
            }
        }
    </script>
</body>
</html>
